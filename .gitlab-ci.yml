stages:
  - validate
  - build
  - test

validate:
  stage: validate
  image: alpine:3.20
  script: |
    echo "Repo root:"
    ls -la
    echo "Checking index.html in repo root..."
    test -f ./index.html
    echo "OK: index.html found"

docker_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script: |
    docker info
    docker build -t site:ci .

smoke_test:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script: |
    docker run -d --name web -p 8080:80 site:ci
    sleep 2
    docker ps
    docker exec web wget -qO- http://localhost:80 | head -n 15
  after_script: |
    docker rm -f web || true